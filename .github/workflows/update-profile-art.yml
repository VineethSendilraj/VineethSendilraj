name: Update profile art

# Refreshes the animated contribution graph SVG from real data.
# Runs daily, plus whenever you push to main, plus on-demand.

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC every day
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render animated contribution graph SVG
        run: python scripts/generate_streak_svg.py VineethSendilraj contrib-heatmap.svg

      - name: Commit updated art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "contrib-heatmap.svg"
